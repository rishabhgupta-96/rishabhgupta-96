name: Metrics
on:
  # Run daily to refresh achievements
  schedule: [{ cron: "0 0 * * *" }]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Refresh on pushes to main (e.g. workflow tweaks)
  push: { branches: ["main"] }

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Achievements
        # Pinned to the fork carrying PR #1769 (projectsV2 migration).
        # lowlighter/metrics @latest/@master still query the deprecated
        # Projects (classic) API and fail with "Unexpected error".
        # Revert to lowlighter/metrics@latest once that fix merges upstream.
        uses: dkhokhlov/metrics@ca58c6bb513e4a04afca0ad2e46b943b543f74cc
        with:
          # A personal access token stored as the METRICS_TOKEN repo secret.
          # A scopeless (public) token is enough for the achievements plugin.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.achievements.svg
          # base: "" drops the default header/activity panels so the SVG
          # contains only the achievements section.
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

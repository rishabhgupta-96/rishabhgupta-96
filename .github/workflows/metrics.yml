name: Metrics
on:
  # Refresh daily
  schedule: [{ cron: "0 0 * * *" }]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Refresh on pushes to main
  push: { branches: ["main"] }

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          # METRICS_TOKEN repo secret. The languages plugin is scopeless: a
          # classic PAT with NO scopes selected is enough for public repos.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.languages.svg
          # base: "" drops the default header/activity panels so the SVG
          # contains only the languages section.
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
